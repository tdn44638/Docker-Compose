<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Database Dashboard</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(15, 23, 42, 0.88);
      --panel-2: rgba(30, 41, 59, 0.88);
      --border: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --danger: #f97316;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.20), transparent 30%),
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.14), transparent 28%),
        linear-gradient(180deg, #050816, var(--bg) 30%, #0f172a 100%);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1600px;
      margin: 0 auto;
      padding: 32px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-end;
      margin-bottom: 24px;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(30, 41, 59, 0.78));
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 3vw, 3.25rem);
      letter-spacing: -0.04em;
    }

    .sub {
      color: var(--muted);
      margin: 0;
      line-height: 1.5;
    }

    .meta {
      display: grid;
      gap: 10px;
      min-width: 260px;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.25);
      color: #cffafe;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      width: fit-content;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 18px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.4);
    }

    .card-title {
      font-weight: 700;
      font-size: 1.05rem;
    }

    .card-info {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .table-wrap {
      overflow: auto;
      max-height: 560px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 100%;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      text-align: left;
      vertical-align: top;
      font-size: 0.92rem;
    }

    th {
      position: sticky;
      top: 0;
      background: #111827;
      z-index: 1;
      color: #dbeafe;
      font-weight: 600;
    }

    tr:hover td {
      background: rgba(56, 189, 248, 0.05);
    }

    .empty {
      padding: 18px;
      color: var(--muted);
    }

    .footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    code {
      background: rgba(148, 163, 184, 0.14);
      padding: 2px 6px;
      border-radius: 8px;
    }

    @media (max-width: 700px) {
      .wrap { padding: 16px; }
      .hero { flex-direction: column; align-items: flex-start; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div>
        <div class="pill">Live view</div>
        <h1>Database Dashboard</h1>
        <p class="sub">
          Bekijk de inhoud van alle tabellen in je PostgreSQL-database als HTML-tabellen met automatische verversing.
        </p>
      </div>
      <div class="meta">
        <div class="pill">Host: <code>{{ db_host }}:{{ db_port }}</code></div>
        <div class="pill">Database: <code>{{ db_name }}</code></div>
        <div class="pill">Refresh: <code>{{ refresh_seconds }}s</code></div>
      </div>
    </section>

    <div id="tables" class="grid"></div>

    <div class="footer">
      <div>Last update: <span id="updated">loading...</span></div>
      <div>Auto refresh is enabled.</div>
    </div>
  </div>

  <script>
    const refreshSeconds = {{ refresh_seconds }};

    function escapeHtml(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderTable(table) {
      const columns = table.columns || [];
      const rows = table.rows || [];
      const header = columns.map((c) => `<th>${escapeHtml(c.column_name)}</th>`).join("");
      const body = rows.length
        ? rows.map((row) => {
            const cells = columns.map((c) => `<td>${escapeHtml(row[c.column_name])}</td>`).join("");
            return `<tr>${cells}</tr>`;
          }).join("")
        : `<tr><td colspan="${Math.max(columns.length, 1)}" class="empty">Geen rijen gevonden.</td></tr>`;

      return `
        <article class="card">
          <div class="card-head">
            <div>
              <div class="card-title">${escapeHtml(table.schema)}.${escapeHtml(table.name)}</div>
              <div class="card-info">${columns.length} kolommen, ${rows.length} rijen getoond</div>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr>${header}</tr></thead>
              <tbody>${body}</tbody>
            </table>
          </div>
        </article>
      `;
    }

    async function loadSnapshot() {
      const response = await fetch("/api/snapshot", { cache: "no-store" });
      const data = await response.json();
      const tables = document.getElementById("tables");

      tables.innerHTML = data.tables.length
        ? data.tables.map(renderTable).join("")
        : `<div class="card"><div class="empty">Geen tabellen gevonden in deze database.</div></div>`;

      document.getElementById("updated").textContent = new Date(data.generated_at).toLocaleString();
    }

    loadSnapshot();
    setInterval(loadSnapshot, refreshSeconds * 1000);
  </script>
</body>
</html>
