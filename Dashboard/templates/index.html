<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Database Dashboard</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(15, 23, 42, 0.88);
      --panel-2: rgba(30, 41, 59, 0.88);
      --border: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.20), transparent 30%),
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.14), transparent 28%),
        linear-gradient(180deg, #050816, var(--bg) 30%, #0f172a 100%);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1600px;
      margin: 0 auto;
      padding: 32px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-end;
      margin-bottom: 24px;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(30, 41, 59, 0.78));
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 3vw, 3.25rem);
      letter-spacing: -0.04em;
    }

    .sub {
      color: var(--muted);
      margin: 0;
      line-height: 1.5;
    }

    .meta {
      display: grid;
      gap: 10px;
      min-width: 260px;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.25);
      color: #cffafe;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      width: fit-content;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 18px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.4);
    }

    .card-title {
      font-weight: 700;
      font-size: 1.05rem;
    }

    .card-info {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .toolbar {
      display: grid;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(2, 6, 23, 0.32);
    }

    .search-row {
      display: grid;
      gap: 6px;
    }

    .filter-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    }

    .filter-item {
      display: grid;
      gap: 6px;
    }

    .filter-label {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .filter-input {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.20);
      background: rgba(15, 23, 42, 0.82);
      color: var(--text);
      border-radius: 10px;
      padding: 9px 10px;
      outline: none;
    }

    .filter-input:focus {
      border-color: rgba(56, 189, 248, 0.7);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.14);
    }

    .search-input {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.20);
      background: rgba(15, 23, 42, 0.92);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
      font: inherit;
    }

    .search-input:focus {
      border-color: rgba(56, 189, 248, 0.7);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.14);
    }

    .filter-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .button {
      border: 1px solid rgba(148, 163, 184, 0.20);
      background: rgba(56, 189, 248, 0.10);
      color: #e0f2fe;
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      font: inherit;
    }

    .button:hover {
      background: rgba(56, 189, 248, 0.16);
    }

    .pill-muted {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.10);
      border: 1px solid rgba(148, 163, 184, 0.16);
      color: var(--muted);
      font-size: 0.88rem;
      white-space: nowrap;
    }

    .table-wrap {
      overflow: auto;
      max-height: 560px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 100%;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      text-align: left;
      vertical-align: top;
      font-size: 0.92rem;
    }

    th {
      position: sticky;
      top: 0;
      background: #111827;
      z-index: 1;
      color: #dbeafe;
      font-weight: 600;
    }

    tr:hover td {
      background: rgba(56, 189, 248, 0.05);
    }

    .empty {
      padding: 18px;
      color: var(--muted);
    }

    .footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    code {
      background: rgba(148, 163, 184, 0.14);
      padding: 2px 6px;
      border-radius: 8px;
    }

    @media (max-width: 700px) {
      .wrap { padding: 16px; }
      .hero { flex-direction: column; align-items: flex-start; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div>
        <div class="pill">Live view</div>
        <h1>Database Dashboard</h1>
        <p class="sub">
          Bekijk de inhoud van alle tabellen in je PostgreSQL-database als HTML-tabellen met automatische verversing.
        </p>
      </div>
      <div class="meta">
        <div class="pill">Host: <code>{{ db_host }}:{{ db_port }}</code></div>
        <div class="pill">Database: <code>{{ db_name }}</code></div>
        <div class="pill">Refresh: <code>{{ refresh_seconds }}s</code></div>
      </div>
    </section>

    <div id="tables" class="grid"></div>

    <div class="footer">
      <div>Last update: <span id="updated">loading...</span></div>
      <div>Auto refresh is enabled.</div>
    </div>
  </div>

  <script>
    const refreshSeconds = {{ refresh_seconds }};
    const appState = {
      tables: [],
      filters: {},
      searches: {},
      isEditing: false,
    };

    function escapeHtml(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function tableKey(table) {
      return `${table.schema}.${table.name}`;
    }

    function ensureFilterState(key) {
      if (!appState.filters[key]) {
        appState.filters[key] = {};
      }
      return appState.filters[key];
    }

    function ensureSearchState(key) {
      if (typeof appState.searches[key] === "undefined") {
        appState.searches[key] = "";
      }
      return appState.searches[key];
    }

    function normalize(value) {
      return String(value ?? "").trim().toLowerCase();
    }

    function countActiveFilters(filters, searchQuery) {
      const columnFilters = Object.values(filters).filter((value) => normalize(value)).length;
      return columnFilters + (normalize(searchQuery) ? 1 : 0);
    }

    function rowMatchesFilters(row, columns, filters, searchQuery) {
      const query = normalize(searchQuery);
      if (query) {
        const searchable = columns
          .map((column) => normalize(row[column.column_name]))
          .join(" ");
        if (!searchable.includes(query)) {
          return false;
        }
      }

      return columns.every((column) => {
        const value = normalize(filters[column.column_name]);
        if (!value) return true;
        return normalize(row[column.column_name]).includes(value);
      });
    }

    function applyFilters(table) {
      const key = tableKey(table);
      const filters = ensureFilterState(key);
      const searchQuery = ensureSearchState(key);
      const columns = table.columns || [];
      const rows = table.rows || [];
      return rows.filter((row) => rowMatchesFilters(row, columns, filters, searchQuery));
    }

    function updateCardStats(key, totalRows, visibleRows) {
      const element = document.querySelector(`[data-stats="${CSS.escape(key)}"]`);
      if (!element) return;

      const active = countActiveFilters(appState.filters[key] || {}, appState.searches[key] || "");
      element.textContent = active
        ? `${visibleRows} van ${totalRows} rijen zichtbaar, ${active} filter(s) actief`
        : `${visibleRows} van ${totalRows} rijen zichtbaar`;
    }

    function renderFilterControls(table) {
      const key = tableKey(table);
      const filterColumns = table.filter_columns || [];
      const searchQuery = ensureSearchState(key);
      const hidden = Math.max((table.columns || []).length - filterColumns.length, 0);
      const filters = ensureFilterState(key);

      const filterInputs = filterColumns.map((column) => `
        <div class="filter-item">
          <label class="filter-label" for="filter-${escapeHtml(key)}-${escapeHtml(column.column_name)}">
            ${escapeHtml(column.column_name)}
          </label>
          <input
            id="filter-${escapeHtml(key)}-${escapeHtml(column.column_name)}"
            class="filter-input"
            type="text"
            value="${escapeHtml(filters[column.column_name] || "")}"
            placeholder="Filter..."
            data-table="${escapeHtml(key)}"
            data-column="${escapeHtml(column.column_name)}"
          >
        </div>
      `).join("");

      return `
        <div class="toolbar">
          <div class="search-row">
            <label class="filter-label" for="search-${escapeHtml(key)}">Zoek in deze tabel</label>
            <input
              id="search-${escapeHtml(key)}"
              class="search-input"
              type="text"
              value="${escapeHtml(searchQuery)}"
              placeholder="Zoek over alle kolommen..."
              data-search="${escapeHtml(key)}"
            >
          </div>
          <div class="filter-grid">
            ${filterInputs}
          </div>
          <div class="filter-actions">
            <span class="pill-muted">${hidden ? `+ ${hidden} verborgen kolommen` : "Alle filters zichtbaar"}</span>
            <span class="pill-muted" data-stats="${escapeHtml(key)}"></span>
            <button class="button" type="button" data-clear="${escapeHtml(key)}">Clear</button>
          </div>
        </div>
      `;
    }

    function renderTable(table) {
      const columns = table.columns || [];
      const rows = applyFilters(table);
      const key = tableKey(table);
      const totalRows = table.rows ? table.rows.length : 0;
      const header = columns.map((column) => `<th>${escapeHtml(column.column_name)}</th>`).join("");
      const body = rows.length
        ? rows.map((row) => {
            const cells = columns.map((column) => `<td>${escapeHtml(row[column.column_name])}</td>`).join("");
            return `<tr>${cells}</tr>`;
          }).join("")
        : `<tr><td colspan="${Math.max(columns.length, 1)}" class="empty">Geen rijen gevonden.</td></tr>`;

      return `
        <article class="card" data-card="${escapeHtml(key)}">
          <div class="card-head">
            <div>
              <div class="card-title">${escapeHtml(table.schema)}.${escapeHtml(table.name)}</div>
              <div class="card-info">${columns.length} kolommen, ${totalRows} rijen geladen, ${table.filter_columns ? table.filter_columns.length : 0} snelle filters</div>
            </div>
          </div>
          ${renderFilterControls(table)}
          <div class="table-wrap">
            <table>
              <thead><tr>${header}</tr></thead>
              <tbody>${body}</tbody>
            </table>
          </div>
        </article>
      `;
    }

    function rerenderTable(tableData) {
      const key = tableKey(tableData);
      const card = document.querySelector(`[data-card="${CSS.escape(key)}"]`);
      if (!card) return;

      card.outerHTML = renderTable(tableData);
      attachHandlers();
      updateCardStats(key, tableData.rows.length, applyFilters(tableData).length);
    }

    function isFilterEditing() {
      const active = document.activeElement;
      if (!active) return false;
      return active.matches("[data-search], [data-table][data-column]");
    }

    function attachHandlers() {
      document.querySelectorAll("[data-search]").forEach((input) => {
        input.addEventListener("input", (event) => {
          const table = event.target.dataset.search;
          appState.searches[table] = event.target.value;
          const tableData = appState.tables.find((entry) => tableKey(entry) === table);
          if (tableData) {
            rerenderTable(tableData);
          }
        });
      });

      document.querySelectorAll("[data-table][data-column]").forEach((input) => {
        input.addEventListener("input", (event) => {
          const table = event.target.dataset.table;
          const column = event.target.dataset.column;
          ensureFilterState(table)[column] = event.target.value;
          const tableData = appState.tables.find((entry) => tableKey(entry) === table);
          if (tableData) {
            rerenderTable(tableData);
          }
        });
      });

      document.querySelectorAll("[data-clear]").forEach((button) => {
        button.addEventListener("click", (event) => {
          const table = event.currentTarget.dataset.clear;
          appState.filters[table] = {};
          appState.searches[table] = "";
          const tableData = appState.tables.find((entry) => tableKey(entry) === table);
          if (tableData) {
            rerenderTable(tableData);
          }
        });
      });
    }

    async function loadSnapshot() {
      if (isFilterEditing()) {
        return;
      }

      const response = await fetch("/api/snapshot", { cache: "no-store" });
      const data = await response.json();
      appState.tables = data.tables || [];
      const tables = document.getElementById("tables");

      tables.innerHTML = appState.tables.length
        ? appState.tables.map((table) => renderTable(table)).join("")
        : `<div class="card"><div class="empty">Geen tabellen gevonden in deze database.</div></div>`;

      appState.tables.forEach((table) => {
        updateCardStats(tableKey(table), table.rows.length, applyFilters(table).length);
      });

      attachHandlers();
      document.getElementById("updated").textContent = new Date(data.generated_at).toLocaleString();
    }

    loadSnapshot();
    setInterval(loadSnapshot, refreshSeconds * 1000);
  </script>
</body>
</html>
